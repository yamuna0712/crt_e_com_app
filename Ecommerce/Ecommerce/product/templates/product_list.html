<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>view_all_products</title>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>

{% for data in product_data %}
<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title">{{data.p_name}}</h5>
    <p class="card-text"> Type: {{data.p_type}}</p>
      <p class="card-text">Price: {{data.p_price}}</p>
      <p class="card-text">Quantity: {{data.p_quantity}}</p>
   <form action="http://127.0.0.1:8000/product/del_by_id/{{data.id}}/" method="POST">
    {% csrf_token %}
            <button class="btn btn-primary" type="submit">Delete Product</button><br>
   </form>


 <form action="http://127.0.0.1:8000/product/add_to_cart/" method="POST">
    {% csrf_token %}
    <input type="hidden" name="product_id" value="{{data.id}}">
    <button class="btn btn-success" type="submit">Add to cart</button>
</form>

<h2></h2>
   <a href="http://127.0.0.1:8000/product/upd_by_id/{{data.id}}/" class="btn btn-warning">
    Update Product
</a>
  </div>
</div>
{% endfor %}
</body>
</html>
