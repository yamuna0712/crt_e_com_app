<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        /* Centering wrapper */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Form container */
        .container {
            width: 420px;
            background: white;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: none;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            background: #1f2933;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #374151;
        }

        /* Success message */
        .success {
            display: none;
            margin-top: 18px;
            padding: 12px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

    </style>

    <script>
        function showMessage(event) {
            event.preventDefault();
            document.getElementById("successMsg").style.display = "block";
        }
    </script>
</head>

<body>

<div class="wrapper">
    <div class="container">
        <h2>Contact Me</h2>

        <form onsubmit="showMessage(event)">

            <div class="form-group">
                <label>Name</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea rows="4" required></textarea>
            </div>

            <button type="submit">Send Message</button>

            <div id="successMsg" class="success">
                Message sent successfully!
            </div>

        </form>
    </div>
</div>

</body>
</html>
