<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    {% if marks > 90 %}
    <h1>Grade A</h1>
    {% endif %}
    {% if marks > 60 and marks < 80  %}
    <h1>Grade B</h1>
    {% endif %}
    {% if marks < 60 %}
    <h1>Fail</h1>
    {% endif%}

</body>
</html>
